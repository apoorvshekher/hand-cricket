<!DOCTYPE html>
<html>
<head>
  <title>P2P WebRTC Demo</title>
  <style>
    body { font-family: sans-serif; background: #f8f8f8; text-align: center; margin: 0; padding: 40px; }
    textarea { width: 90%; height: 80px; margin: 10px 0; font-size: 16px; }
    button { font-size: 18px; padding: 10px 20px; margin: 10px; }
    #log { background: #222; color: #fff; padding: 10px; min-height: 60px; margin: 20px 0; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>🦗 Minimal P2P WebRTC Demo</h1>
  <div>
    <button onclick="createOffer()">Create Offer (Host)</button>
    <button onclick="createAnswer()">Create Answer (Join)</button>
  </div>
  <div>
    <textarea id="signalIn" placeholder="Paste offer/answer here"></textarea>
    <button onclick="setRemote()">Set Remote</button>
  </div>
  <div>
    <textarea id="signalOut" readonly placeholder="Copy this offer/answer to other player"></textarea>
  </div>
  <div>
    <input id="msg" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>
  <div id="log"></div>

<script>
let pc, channel;

function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
}

function createPeer() {
  pc = new RTCPeerConnection({ iceServers: [] });
  pc.onicecandidate = e => {
    if (e.candidate === null) {
      document.getElementById('signalOut').value = JSON.stringify(pc.localDescription);
    }
  };
  pc.ondatachannel = e => {
    channel = e.channel;
    setupChannel();
  };
}

function createOffer() {
  createPeer();
  channel = pc.createDataChannel('chat');
  setupChannel();
  pc.createOffer().then(d => pc.setLocalDescription(d));
}

function createAnswer() {
  createPeer();
  const offer = document.getElementById('signalIn').value;
  if (!offer) return alert('Paste offer first!');
  pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(offer)))
    .then(() => pc.createAnswer())
    .then(answer => pc.setLocalDescription(answer));
}

function setRemote() {
  const desc = document.getElementById('signalIn').value;
  if (!desc) return alert('Paste offer/answer!');
  pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(desc)));
}

function setupChannel() {
  channel.onopen = () => log('✅ DataChannel open!');
  channel.onmessage = e => log('Peer: ' + e.data);
}

function sendMsg() {
  if (!channel || channel.readyState !== 'open') return alert('Channel not open!');
  const msg = document.getElementById('msg').value;
  channel.send(msg);
  log('You: ' + msg);
  document.getElementById('msg').value = '';
}
</script>
</body>
</html>
