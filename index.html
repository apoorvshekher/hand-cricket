<!DOCTYPE html>
<html>
<head>
  <title>P2P Hand Cricket FIXED</title>
  <style>body{font-family:Arial;text-align:center;margin:20px;}button{padding:10px 20px;margin:5px;font-size:18px;}.finger-btn{background:#4CAF50;color:white;border:none;cursor:pointer;font-size:20px;width:50px;height:50px;margin:5px;border-radius:50%;}.finger-btn:hover{background:#45a049;}textarea{width:500px;height:120px;margin:10px;font-family:monospace;font-size:12px;}#status,#scores{font-size:24px;font-weight:bold;}</style>
</head>
<body>
  <h1>🦗 Hand Cricket P2P (Fixed)</h1>
  <div id="status">Start: Player 1 clicks CREATE OFFER</div>
  <div id="scores">P1:0 | P2:0 | Balls:0/6 | Outs:0/3</div>
  
  <p><button onclick="createOffer()" style="background:#ff9800;color:white">🚀 CREATE OFFER (Player 1)</button></p>
  <p><label>📋 PASTE OFFER HERE:</label><br><textarea id="offerBox" placeholder="Paste the FULL text from opponent (includes { })"></textarea></p>
  <p><button onclick="setRemote()" style="background:#2196F3;color:white">✅ SET OPPONENT OFFER (Both players)</button></p>
  <p><label>📤 COPY ANSWER FOR FRIEND:</label><br><textarea id="answerBox" readonly placeholder="Auto-fills after setting offer"></textarea></p>
  
  <div style="background:#f0f0f0;padding:10px;margin:20px;">
    <h3>Finger Buttons (after "Connected!"):</h3>
    <button class="finger-btn" onclick="sendFinger(1)">1️⃣</button>
    <button class="finger-btn" onclick="sendFinger(2)">2️⃣</button>
    <button class="finger-btn" onclick="sendFinger(3)">3️⃣</button>
    <button class="finger-btn" onclick="sendFinger(4)">4️⃣</button>
    <button class="finger-btn" onclick="sendFinger(5)">5️⃣</button>
    <button class="finger-btn" onclick="sendFinger(6)">6️⃣</button>
  </div>
  <p><button onclick="newGame()" style="background:#4CAF50;color:white">🔄 New Game</button></p>

  <script>
    let pc, dc, myFinger=0, oppFinger=0, p1Score=0, p2Score=0, balls=0, outs=0, isP1=true, connected=false;
    
    function log(msg){console.log('[DEBUG]',msg);document.getElementById('status').innerText=msg;}
    
    function initPC(){
      pc?.close();
      pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
      dc = pc.createDataChannel('cricket');
      dc.onopen=()=>{connected=true;log('✅ CONNECTED! Play fingers!');};
      dc.onmessage=e=>{
        const data=JSON.parse(e.data);
        if(data.type==='finger'){oppFinger=data.value;checkMatch();}
      };
      pc.onconnectionstatechange=()=>{log(`ICE: ${pc.connectionState}`);};
    }
    initPC();
    
    async function createOffer(){
      log('Creating offer...');
      const offer=await pc.createOffer();
      await pc.setLocalDescription(offer);
      document.getElementById('offerBox').value=JSON.stringify(offer, null, 2);
      log('✅ OFFER READY! Copy top box & send to friend');
    }
    
    async function setRemote(){
      const text=document.getElementById('offerBox').value.trim();
      if(!text){alert('🚫 Paste offer first!');return;}
      try{
        const offer=JSON.parse(text);
        log('Parsing offer...');
        await pc.setRemoteDescription(offer);
        const answer=await pc.createAnswer();
        await pc.setLocalDescription(answer);
        document.getElementById('answerBox').value=JSON.stringify(answer, null, 2);
        log('✅ ANSWER READY! Copy BOTTOM box & send back');
      }catch(e){
        log(`❌ ERROR: ${e.message}`);
        if(e.message.includes('Invalid')) alert('Invalid JSON! Copy FULL text with {} brackets');
        else alert('Use Chrome/Firefox. Disable VPN/Firewall');
      }
    }
    
    function sendFinger(n){
      if(!connected){alert('Connect first!');return;}
      if(myFinger){alert('Wait result!');return;}
      myFinger=n; dc.send(JSON.stringify({type:'finger',value:n}));
      log(`You: ${n} 🤜 Waiting opponent...`);
    }
    
    function checkMatch(){
      log(`Opponent showed: ${oppFinger}`);
      if(myFinger===oppFinger){
        outs++; log('OUT! 🙅‍♂️ Swap batting');
        isP1=!isP1;
      }else{
        if(isP1) p1Score+=myFinger; else p2Score+=myFinger;
        balls++; log(`RUNS +${myFinger}! 🏏`);
      }
      document.getElementById('scores').innerText=`P1:${p1Score}|P2:${p2Score}|Balls:${balls}/6|Outs:${outs}/3`;
      myFinger=oppFinger=0;
      if(balls>=6||outs>=3) log(`INNINGS END! P1:${p1Score} P2:${p2Score}`);
    }
    
    function newGame(){
      p1Score=p2Score=balls=outs=0;isP1=true;connected=false;
      document.getElementById('offerBox').value='';
      document.getElementById('answerBox').value='';
      document.getElementById('scores').innerText='P1:0|P2:0|Balls:0/6|Outs:0/3';
      initPC(); log('New game ready!');
    }
  </script>
</body>
</html>
