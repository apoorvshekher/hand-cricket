<!DOCTYPE html>
<html>
<head>
  <title>Hand Cricket Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-top: 40px;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 2px 2px 8px #ff4e50a0;
    }
    #mainCard {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 32px 0 #ff4e5040;
      padding: 32px 28px 18px 28px;
      margin: 32px 0 0 0;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #roomSection input {
      font-size: 22px;
      padding: 10px;
      width: 140px;
      border-radius: 10px;
      border: 2px solid #f9d423;
      margin-bottom: 10px;
      background: #fffbe6;
      text-align: center;
      letter-spacing: 2px;
    }
    #roomSection button {
      font-size: 18px;
      padding: 10px 22px;
      margin: 0 8px 10px 8px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #f9d423 0%, #ff4e50 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px #ff4e5040;
      transition: background 0.2s, transform 0.2s;
    }
    #roomSection button:hover {
      background: linear-gradient(90deg, #ff4e50 0%, #f9d423 100%);
      transform: translateY(-2px) scale(1.04);
    }
    #roomStatus {
      color: #ff4e50;
      font-weight: 600;
      margin-bottom: 10px;
    }
    #game {
      margin-top: 18px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 10px;
    }
    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #fffbe6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.1rem;
      box-shadow: 0 2px 8px #ff4e5040;
      border: 2px solid #f9d423;
      margin: 0 8px;
    }
    .score {
      font-size: 2.1rem;
      color: #f9d423;
      font-weight: 900;
      text-shadow: 1px 1px 8px #ff4e5040;
      margin: 0 8px;
    }
    #turnInfo {
      color: #ff4e50;
      font-size: 1.3rem;
      margin-bottom: 18px;
      font-weight: 700;
      text-align: center;
    }
    #fingers {
      margin: 24px 0 18px 0;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    #fingers button {
      font-size: 2.1rem;
      width: 60px;
      height: 60px;
      margin: 0;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%);
      color: #fff;
      font-weight: 900;
      box-shadow: 0 2px 8px #ff4e5040;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      outline: none;
      position: relative;
    }
    #fingers button.selected {
      box-shadow: 0 0 0 4px #f9d42380, 0 2px 8px #ff4e5040;
      background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);
      transform: scale(1.18);
    }
    #fingers button:hover {
      background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%);
      transform: scale(1.12);
    }
    #gameLog {
      background: #fffbe6;
      color: #333;
      padding: 14px 10px;
      border-radius: 10px;
      min-height: 48px;
      font-size: 1.08em;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px #ff4e5020;
      white-space: pre-line;
      text-align: left;
      width: 100%;
      max-width: 340px;
    }
    #log {
      background: #222;
      color: #fff;
      padding: 10px;
      min-height: 60px;
      margin: 20px 0;
      border-radius: 8px;
      font-size: 0.98em;
      max-width: 420px;
      word-break: break-all;
    }
    input#msg {
      font-size: 18px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 2px solid #f9d423;
      margin: 10px 0 0 0;
      width: 220px;
      background: #fffbe6;
    }
    button {
      font-family: 'Montserrat', sans-serif;
    }
    @media (max-width: 600px) {
      #mainCard { padding: 16px 2vw 10px 2vw; }
      #log { max-width: 98vw; }
    }
  </style>
</head>
<body>

  <h1>🦗 Hand Cricket Online</h1>
  <div id="mainCard">
    <div id="roomSection">
      <input id="roomInput" maxlength="6" placeholder="Room ID">
      <button onclick="createRoom()">Create Room</button>
      <button onclick="joinRoom()">Join Room</button>
      <div id="roomStatus"></div>
    </div>
    <div id="game" style="display:none;">
      <h2 id="turnInfo">Waiting for connection...</h2>
      <div class="score-row">
        <div class="avatar" id="myAvatar" title="You">🧑</div>
        <div class="score" id="myScore">0</div>
        <span style="font-size:1.5rem;color:#ff4e50;font-weight:700;">vs</span>
        <div class="score" id="peerScore">0</div>
        <div class="avatar" id="peerAvatar" title="Peer">👤</div>
      </div>
      <div id="fingers">
        <button onclick="chooseFinger(1)">1</button>
        <button onclick="chooseFinger(2)">2</button>
        <button onclick="chooseFinger(3)">3</button>
        <button onclick="chooseFinger(4)">4</button>
        <button onclick="chooseFinger(5)">5</button>
      </div>
      <div id="gameLog"></div>
    </div>
    <div style="margin-top:18px;">
      <input id="msg" placeholder="Type message...">
      <button onclick="sendMsg()">Send</button>
    </div>
    <div id="log"></div>
  </div>



<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="lz-string.min.js"></script>
<script>

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyA3ynYiHjw_C18XDXrZ15s7211GhSqSyUo",
  authDomain: "hand-cricket-51764.firebaseapp.com",
  projectId: "hand-cricket-51764",
  storageBucket: "hand-cricket-51764.firebasestorage.app",
  messagingSenderId: "227453166416",
  appId: "1:227453166416:web:8d6b92be54e14464d58255"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let pc, channel;
let myScore = 0, peerScore = 0;
let myTurn = false;
let myLastFinger = null, peerLastFinger = null;
let isOut = false, peerIsOut = false;
let isFirstInning = true, target = null;
let isHost = false;
let roomId = null;
let isRoomCreator = false;

function copySignalOut() {
  const ta = document.getElementById('signalOut');
  ta.select();
  ta.setSelectionRange(0, 99999); // For mobile
  document.execCommand('copy');
  log('📋 Copied offer/answer to clipboard.');
}


function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
}

function createPeer() {
  pc = new RTCPeerConnection({ iceServers: [
    { urls: 'stun:stun.l.google.com:19302' }
  ] });
  pc.onicecandidate = e => {
    if (e.candidate) {
      sendSignal('candidate', e.candidate);
    }
  };
  pc.ondatachannel = e => {
    channel = e.channel;
    setupChannel();
  };
  pc.onconnectionstatechange = () => {
    log('Connection state: ' + pc.connectionState);
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      log('❌ Connection failed or disconnected. Try again.');
    }
    if (pc.connectionState === 'connected') {
      log('🎉 Peers are fully connected!');
    }
  };
}

function sendSignal(type, data) {
  if (!roomId) return;
  db.ref('rooms/' + roomId + '/' + (isRoomCreator ? 'host' : 'joiner')).push({ type, data });
}

function listenForSignals() {
  if (!roomId) return;
  const peerKey = isRoomCreator ? 'joiner' : 'host';
  db.ref('rooms/' + roomId + '/' + peerKey).on('child_added', snap => {
    const msg = snap.val();
    if (msg.type === 'offer') {
      pc.setRemoteDescription(new RTCSessionDescription(msg.data));
      createAnswerSignal();
    } else if (msg.type === 'answer') {
      pc.setRemoteDescription(new RTCSessionDescription(msg.data));
    } else if (msg.type === 'candidate') {
      pc.addIceCandidate(new RTCIceCandidate(msg.data));
    }
  });
}

function createRoom() {
  roomId = Math.random().toString().slice(2,8);
  isRoomCreator = true;
  document.getElementById('roomInput').value = roomId;
  document.getElementById('roomInput').disabled = true;
  // Show the room code and sharing instructions, but hide only the buttons and input
  document.getElementById('roomStatus').innerHTML = '<b>Room created!</b><br>Share this code with your friend:<br><span style="font-size:1.7em;color:#ff4e50;font-weight:900;letter-spacing:2px;">' + roomId + '</span>';
  // Hide only the input and buttons, keep status visible
  document.getElementById('roomInput').style.display = 'none';
  var btns = document.querySelectorAll('#roomSection button');
  btns.forEach(btn => btn.style.display = 'none');
  startHost();
}

function joinRoom() {
  roomId = document.getElementById('roomInput').value.trim();
  if (!roomId || roomId.length !== 6) {
    alert('Enter a valid 6-digit room code!');
    return;
  }
  isRoomCreator = false;
  document.getElementById('roomInput').disabled = true;
  document.getElementById('roomStatus').textContent = 'Joining room: ' + roomId;
  document.getElementById('roomSection').style.display = 'none';
  startJoiner();
}

function startHost() {
  createPeer();
  channel = pc.createDataChannel('chat');
  setupChannel();
  pc.createOffer().then(offer => {
    pc.setLocalDescription(offer);
    sendSignal('offer', offer);
  });
  listenForSignals();
}

function startJoiner() {
  createPeer();
  listenForSignals();
}

function createAnswerSignal() {
  pc.createAnswer().then(answer => {
    pc.setLocalDescription(answer);
    sendSignal('answer', answer);
  });
}

function createOffer() {
  createPeer();
  channel = pc.createDataChannel('chat');
  setupChannel();
  pc.createOffer().then(d => pc.setLocalDescription(d));
}

function createAnswer() {
  createPeer();
  const offerCompressed = document.getElementById('signalIn').value.trim();
  if (!offerCompressed) return alert('Paste offer first!');
  let offerJson;
  try {
    offerJson = LZString.decompressFromBase64(offerCompressed);
    if (!offerJson) throw new Error('Invalid compressed code');
  } catch (e) {
    log('❌ Invalid or corrupt code.');
    alert('Invalid or corrupt code!');
    return;
  }
  pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(offerJson)))
    .then(() => pc.createAnswer())
    .then(answer => pc.setLocalDescription(answer));
}

function setRemote() {
  const descCompressed = document.getElementById('signalIn').value.trim();
  if (!descCompressed) {
    log('⚠️ Please paste offer/answer before setting remote.');
    alert('Paste offer/answer!');
    return;
  }
  let descJson;
  try {
    descJson = LZString.decompressFromBase64(descCompressed);
    if (!descJson) throw new Error('Invalid compressed code');
  } catch (e) {
    log('❌ Invalid or corrupt code.');
    alert('Invalid or corrupt code!');
    return;
  }
  try {
    pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(descJson)))
      .then(() => log('✅ Remote description set.'))
      .catch(e => {
        log('❌ Error setting remote: ' + e);
        alert('Error setting remote: ' + e);
      });
  } catch (e) {
    log('❌ Invalid offer/answer format.');
    alert('Invalid offer/answer format!');
  }
}

function setupChannel() {
  channel.onopen = () => {
    log('✅ DataChannel open! You can now chat.');
    document.getElementById('game').style.display = '';
    document.getElementById('turnInfo').textContent = 'Waiting for peer...';
    // Decide who bats first: host bats first
    myTurn = isHost = (channel.label === 'chat');
    updateTurnInfo();
    if (myTurn) logGame('You bat first!');
    else logGame('Peer bats first!');
  };
  channel.onclose = () => log('⚠️ DataChannel closed.');
  channel.onerror = e => log('❌ DataChannel error: ' + e);
  channel.onmessage = e => handleGameMessage(e.data);
}

function logGame(msg) {
  document.getElementById('gameLog').textContent += msg + '\n';
  document.getElementById('gameLog').scrollTop = document.getElementById('gameLog').scrollHeight;
}

function updateTurnInfo() {
  if (isOut && peerIsOut) {
    // Game over
    if (myScore > peerScore) document.getElementById('turnInfo').textContent = '🏆 You Win!';
    else if (myScore < peerScore) document.getElementById('turnInfo').textContent = '😢 You Lose!';
    else document.getElementById('turnInfo').textContent = '🤝 Draw!';
    document.getElementById('fingers').style.display = 'none';
    return;
  }
  if (isOut) {
    document.getElementById('turnInfo').textContent = 'You are OUT! Waiting for peer...';
    document.getElementById('fingers').style.display = 'none';
    return;
  }
  if (peerIsOut) {
    document.getElementById('turnInfo').textContent = 'Peer is OUT! Your turn.';
    document.getElementById('fingers').style.display = '';
    return;
  }
  document.getElementById('turnInfo').textContent = myTurn ? 'Your turn: Choose fingers' : 'Peer turn: Wait...';
  document.getElementById('fingers').style.display = myTurn ? '' : 'none';
}

function updateScores() {
  document.getElementById('myScore').textContent = myScore;
  document.getElementById('peerScore').textContent = peerScore;
}

function chooseFinger(num) {
  if (!myTurn || isOut) return;
  myLastFinger = num;
  // Animate selection
  Array.from(document.querySelectorAll('#fingers button')).forEach(btn => btn.classList.remove('selected'));
  document.querySelector(`#fingers button:nth-child(${num})`).classList.add('selected');
  setTimeout(() => {
    Array.from(document.querySelectorAll('#fingers button')).forEach(btn => btn.classList.remove('selected'));
  }, 600);
  channel.send(JSON.stringify({ type: 'finger', value: num }));
  logGame('You showed: ' + num);
  checkBothFingers();
  myTurn = false;
  updateTurnInfo();
}

function handleGameMessage(data) {
  // Try to parse as JSON, else treat as chat
  try {
    const msg = JSON.parse(data);
    if (msg.type === 'finger') {
      peerLastFinger = msg.value;
      logGame('Peer showed: ' + peerLastFinger);
      checkBothFingers();
      myTurn = true;
      updateTurnInfo();
    }
  } catch (e) {
    // Fallback: treat as chat
    log('Peer: ' + data);
  }
}

function checkBothFingers() {
  if (myLastFinger !== null && peerLastFinger !== null) {
    // Batting: if same, OUT, else add to score
    if (myTurn) {
      // I am batting
      if (myLastFinger === peerLastFinger) {
        logGame('You are OUT!');
        isOut = true;
        if (isFirstInning) {
          isFirstInning = false;
          target = myScore + 1;
          logGame('Target for peer: ' + target);
          // Switch roles
          [myScore, peerScore] = [peerScore, myScore];
          [isOut, peerIsOut] = [peerIsOut, isOut];
        }
      } else {
        myScore += myLastFinger;
        logGame('You scored ' + myLastFinger + '!');
      }
    } else {
      // Peer is batting
      if (myLastFinger === peerLastFinger) {
        logGame('Peer is OUT!');
        peerIsOut = true;
        if (isFirstInning) {
          isFirstInning = false;
          target = peerScore + 1;
          logGame('Target for you: ' + target);
          // Switch roles
          [myScore, peerScore] = [peerScore, myScore];
          [isOut, peerIsOut] = [peerIsOut, isOut];
        }
      } else {
        peerScore += peerLastFinger;
        logGame('Peer scored ' + peerLastFinger + '!');
      }
    }
    updateScores();
    myLastFinger = null;
    peerLastFinger = null;
    // Check for win in second inning
    if (!isFirstInning && (isOut || peerIsOut)) {
      if (myScore >= target) {
        isOut = peerIsOut = true;
        updateTurnInfo();
      } else if (peerScore >= target) {
        isOut = peerIsOut = true;
        updateTurnInfo();
      }
    }
  }
}

function sendMsg() {
  if (!channel || channel.readyState !== 'open') return alert('Channel not open!');
  const msg = document.getElementById('msg').value;
  channel.send(msg);
  log('You: ' + msg);
  document.getElementById('msg').value = '';
}
</script>
</body>
</html>
